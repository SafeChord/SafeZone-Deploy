name: Deploy App Layer

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options:
          - preview
          - staging
        default: preview
      skip_seeding:
        description: 'Skip DB seeding (schema + cases)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      issues: write  # freight record (see the last step)
    env:
      NS: ${{ inputs.environment == 'staging' && 'safezone' || 'safezone-preview' }}
      APP_DIR: deploy/${{ inputs.environment }}/app
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build low-privilege kubeconfig
        run: |
          set -euo pipefail
          bash scripts/ops/gen-kubeconfig.sh "$NS"

      - name: Set KUBECONFIG
        run: echo "KUBECONFIG=kubeconfig-${NS}.yaml" >> $GITHUB_ENV

      - name: Verify K8s access
        run: kubectl config get-contexts

      # ── Phase 1: Foundation (cli-relay, time-server, httproutes, configmap) ──
      - name: Apply foundation
        run: kubectl apply -f "$APP_DIR/safezone-foundation.yaml"

      - name: Wait for foundation healthy
        run: |
          set -euo pipefail
          echo "Waiting for foundation deployments..."
          for DEPLOY in safezone-cli-relay safezone-time-server; do
            echo "  waiting for $DEPLOY..."
            until kubectl get deploy "$DEPLOY" -n "$NS" &>/dev/null && \
                  kubectl rollout status deploy/"$DEPLOY" -n "$NS" --timeout=120s; do
              sleep 5
            done
          done
          echo "Foundation is ready."

      # ── Phase 2: Seed Schema (DDL + static reference data) ──
      - name: Apply seed-schema
        if: ${{ !inputs.skip_seeding }}
        run: kubectl apply -f "$APP_DIR/safezone-ops-schema.yaml"

      - name: Wait for seed-schema job
        if: ${{ !inputs.skip_seeding }}
        run: |
          set -euo pipefail
          LABEL="app.kubernetes.io/instance=safezone-ops-schema"
          MAX_RETRIES=5
          RETRY=0

          echo "Waiting for seed-schema job to appear..."
          until kubectl get job -n "$NS" -l "$LABEL" -o name 2>/dev/null | grep -q job; do
            sleep 3
          done

          while [ $RETRY -lt $MAX_RETRIES ]; do
            JOB=$(kubectl get job -n "$NS" -l "$LABEL" \
              --sort-by=.metadata.creationTimestamp -o name 2>/dev/null | tail -1)
            if [ -n "$JOB" ]; then
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: waiting for $JOB..."
              if kubectl wait "$JOB" -n "$NS" --for=condition=complete --timeout=60s 2>/dev/null; then
                echo "Seed-schema completed."
                break
              fi
            else
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: no job found yet..."
            fi
            RETRY=$((RETRY + 1))
            [ $RETRY -lt $MAX_RETRIES ] && sleep 5
          done

          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "ERROR: seed-schema job did not complete after $MAX_RETRIES attempts."
            exit 1
          fi

      # ── Phase 3: Core (analytics-api, ingestor, simulator, pandemic-simulator) ──
      - name: Apply core
        run: kubectl apply -f "$APP_DIR/safezone-core.yaml"

      - name: Wait for core healthy
        run: |
          set -euo pipefail
          echo "Waiting for core deployments..."
          for DEPLOY in safezone-analytics-api safezone-ingestor safezone-pandemic-simulator; do
            echo "  waiting for $DEPLOY..."
            until kubectl get deploy "$DEPLOY" -n "$NS" &>/dev/null && \
                  kubectl rollout status deploy/"$DEPLOY" -n "$NS" --timeout=120s; do
              sleep 5
            done
          done
          echo "Core is ready."

      # ── Phase 3.5: Smoke gate (szcli data-path test through the full pipeline) ──
      # Runs after core (dimensional data present, pipeline up) and BEFORE
      # seed-cases: the smoke cleanup truncates covid_cases, so it must never
      # run after the showcase data lands without a re-seed following.
      # Gated on !skip_seeding for the same reason. Hard gate: failure fails
      # the deploy (forward-fix, no rollback in 0.x).
      - name: Apply smoke
        if: ${{ !inputs.skip_seeding }}
        run: kubectl apply -f "$APP_DIR/safezone-ops-smoke.yaml"

      - name: Wait for smoke job (hard gate)
        if: ${{ !inputs.skip_seeding }}
        run: |
          set -euo pipefail
          LABEL="app.kubernetes.io/instance=safezone-ops-smoke"
          MAX_RETRIES=5
          RETRY=0

          echo "Waiting for smoke job to appear..."
          until kubectl get job -n "$NS" -l "$LABEL" -o name 2>/dev/null | grep -q job; do
            sleep 3
          done

          while [ $RETRY -lt $MAX_RETRIES ]; do
            JOB=$(kubectl get job -n "$NS" -l "$LABEL" \
              --sort-by=.metadata.creationTimestamp -o name 2>/dev/null | tail -1)
            if [ -n "$JOB" ]; then
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: waiting for $JOB..."
              if kubectl wait "$JOB" -n "$NS" --for=condition=complete --timeout=120s 2>/dev/null; then
                echo "Smoke test passed."
                break
              fi
            else
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: no job found yet..."
            fi
            RETRY=$((RETRY + 1))
            [ $RETRY -lt $MAX_RETRIES ] && sleep 5
          done

          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "ERROR: smoke job did not complete after $MAX_RETRIES attempts."
            kubectl logs -n "$NS" -l "$LABEL" --tail=100 || true
            exit 1
          fi

      # ── Phase 4: Seed Cases (covid case data injection) ──
      - name: Apply seed-cases
        if: ${{ !inputs.skip_seeding }}
        run: kubectl apply -f "$APP_DIR/safezone-ops-cases.yaml"

      - name: Wait for seed-cases job
        if: ${{ !inputs.skip_seeding }}
        run: |
          set -euo pipefail
          LABEL="app.kubernetes.io/instance=safezone-ops-cases"
          MAX_RETRIES=5
          RETRY=0

          echo "Waiting for seed-cases job to appear..."
          until kubectl get job -n "$NS" -l "$LABEL" -o name 2>/dev/null | grep -q job; do
            sleep 3
          done

          while [ $RETRY -lt $MAX_RETRIES ]; do
            JOB=$(kubectl get job -n "$NS" -l "$LABEL" \
              --sort-by=.metadata.creationTimestamp -o name 2>/dev/null | tail -1)
            if [ -n "$JOB" ]; then
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: waiting for $JOB..."
              if kubectl wait "$JOB" -n "$NS" --for=condition=complete --timeout=60s 2>/dev/null; then
                echo "Seed-cases completed."
                break
              fi
            else
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: no job found yet..."
            fi
            RETRY=$((RETRY + 1))
            [ $RETRY -lt $MAX_RETRIES ] && sleep 5
          done

          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "ERROR: seed-cases job did not complete after $MAX_RETRIES attempts."
            exit 1
          fi

      # ── Phase 5: UI (dashboard-v2 SPA + classic dashboard) ──
      - name: Apply UI
        run: kubectl apply -f "$APP_DIR/safezone-ui.yaml"

      - name: Wait for UI healthy
        run: |
          set -euo pipefail
          echo "Waiting for dashboards..."
          for DEPLOY in safezone-dashboard safezone-dashboard-v2; do
            echo "  waiting for $DEPLOY..."
            until kubectl get deploy "$DEPLOY" -n "$NS" &>/dev/null && \
                  kubectl rollout status deploy/"$DEPLOY" -n "$NS" --timeout=120s; do
              sleep 5
            done
          done
          echo "UI is ready."

      # ── Phase 6: Scheduler (staging only) ──
      - name: Apply scheduler
        if: ${{ inputs.environment == 'staging' }}
        run: kubectl apply -f "$APP_DIR/safezone-scheduler.yaml"

      - name: Deployment complete
        run: echo "${{ inputs.environment }} app layer deployed successfully!"

      # ── Freight record (IssueOps) ──
      # Records the AUTOMATED in-cluster result on the candidate's freight issue
      # — it does NOT add the `validated` label. The automated battery (rollouts,
      # seed, Phase 3.5 smoke) does not exercise the browser / external-DNS /
      # gateway-routing surface where this release's bugs actually lived (413,
      # trailing-slash 404, redirect scheme). `validated` = full GATE 2 incl.
      # those human-judged checks; it is stamped by the /validate-freight skill
      # only on explicit human sign-off. Title matched EXACTLY (never parsed);
      # find-or-create so the issue always exists for the closing checklist.
      - name: Record automated in-cluster result (preview only)
        if: ${{ inputs.environment == 'preview' && !inputs.skip_seeding }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$(grep -rh 'tag:' helm-charts/*/values-preview*.yaml | awk '{print $2}' | sort -u)
          if [ "$(echo "$TAG" | wc -l)" -ne 1 ]; then
            echo "::error::values pin more than one image tag — this run did not validate a single coherent image set:"
            echo "$TAG"
            exit 1
          fi
          TITLE="freight: ${TAG}"
          NUM=$(gh issue list --repo "$GITHUB_REPOSITORY" --label freight --state all \
            --json number,title --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -z "$NUM" ]; then
            echo "No candidate announcement found — creating the freight issue at validation time."
            URL=$(gh issue create --repo "$GITHUB_REPOSITORY" --label freight \
              --title "$TITLE" --body "Created at validation time (no candidate announcement from publish-dev).")
            NUM="${URL##*/}"
          fi
          BODY=$(printf '**Automated in-cluster checks passed** (environment: preview, branch: `%s`). Run: %s/%s/actions/runs/%s\n\n- [x] deployment rollouts healthy\n- [x] seed-schema + seed-cases jobs complete\n- [x] Phase 3.5 smoke gate (szcli data-path) green\n\nStill required before the `validated` label (run `/validate-freight %s`):\n- [ ] gateway log scan clean (no 4xx/5xx on dashboard routes)\n- [ ] external-DNS probes (both dashboards, API/time, big-POST != 413, http->301)\n- [ ] human visual check (map renders, charts sensible)' \
            "$GITHUB_REF_NAME" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" "$TAG")
          gh issue comment "$NUM" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          echo "Freight #$NUM: automated result recorded (NOT validated — awaiting GATE 2 sign-off)."
