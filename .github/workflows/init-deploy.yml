name: Deploy App Layer

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options:
          - preview
          - staging
        default: preview
      skip_seeding:
        description: 'Skip DB seeding (schema + cases)'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: self-hosted
    env:
      NS: ${{ inputs.environment == 'staging' && 'safezone' || 'safezone-preview' }}
      APP_DIR: deploy/${{ inputs.environment }}/app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build low-privilege kubeconfig
        run: |
          set -euo pipefail
          bash scripts/ops/gen-kubeconfig.sh "$NS"

      - name: Set KUBECONFIG
        run: echo "KUBECONFIG=kubeconfig-${NS}.yaml" >> $GITHUB_ENV

      - name: Verify K8s access
        run: kubectl config get-contexts

      # ── Phase 1: Foundation (cli-relay, time-server, ingress, configmap) ──
      - name: Apply foundation
        run: kubectl apply -f "$APP_DIR/safezone-foundation.yaml"

      - name: Wait for foundation healthy
        run: |
          set -euo pipefail
          echo "Waiting for foundation deployments..."
          for DEPLOY in safezone-cli-relay safezone-time-server; do
            echo "  waiting for $DEPLOY..."
            until kubectl get deploy "$DEPLOY" -n "$NS" &>/dev/null && \
                  kubectl rollout status deploy/"$DEPLOY" -n "$NS" --timeout=120s; do
              sleep 5
            done
          done
          echo "Foundation is ready."

      # ── Phase 2: Seed Schema (DDL + static reference data) ──
      - name: Apply seed-schema
        if: ${{ !inputs.skip_seeding }}
        run: kubectl apply -f "$APP_DIR/safezone-seed-schema.yaml"

      - name: Wait for seed-schema job
        if: ${{ !inputs.skip_seeding }}
        run: |
          set -euo pipefail
          LABEL="app.kubernetes.io/instance=safezone-seed-schema"
          MAX_RETRIES=5
          RETRY=0

          echo "Waiting for seed-schema job to appear..."
          until kubectl get job -n "$NS" -l "$LABEL" -o name 2>/dev/null | grep -q job; do
            sleep 3
          done

          while [ $RETRY -lt $MAX_RETRIES ]; do
            JOB=$(kubectl get job -n "$NS" -l "$LABEL" \
              --sort-by=.metadata.creationTimestamp -o name 2>/dev/null | tail -1)
            if [ -n "$JOB" ]; then
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: waiting for $JOB..."
              if kubectl wait "$JOB" -n "$NS" --for=condition=complete --timeout=60s 2>/dev/null; then
                echo "Seed-schema completed."
                break
              fi
            else
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: no job found yet..."
            fi
            RETRY=$((RETRY + 1))
            [ $RETRY -lt $MAX_RETRIES ] && sleep 5
          done

          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "ERROR: seed-schema job did not complete after $MAX_RETRIES attempts."
            exit 1
          fi

      # ── Phase 3: Core (analytics-api, ingestor, simulator, pandemic-simulator) ──
      - name: Apply core
        run: kubectl apply -f "$APP_DIR/safezone-core.yaml"

      - name: Wait for core healthy
        run: |
          set -euo pipefail
          echo "Waiting for core deployments..."
          for DEPLOY in safezone-analytics-api safezone-ingestor safezone-pandemic-simulator; do
            echo "  waiting for $DEPLOY..."
            until kubectl get deploy "$DEPLOY" -n "$NS" &>/dev/null && \
                  kubectl rollout status deploy/"$DEPLOY" -n "$NS" --timeout=120s; do
              sleep 5
            done
          done
          echo "Core is ready."

      # ── Phase 4: Seed Cases (covid case data injection) ──
      - name: Apply seed-cases
        if: ${{ !inputs.skip_seeding }}
        run: kubectl apply -f "$APP_DIR/safezone-seed-cases.yaml"

      - name: Wait for seed-cases job
        if: ${{ !inputs.skip_seeding }}
        run: |
          set -euo pipefail
          LABEL="app.kubernetes.io/instance=safezone-seed-cases"
          MAX_RETRIES=5
          RETRY=0

          echo "Waiting for seed-cases job to appear..."
          until kubectl get job -n "$NS" -l "$LABEL" -o name 2>/dev/null | grep -q job; do
            sleep 3
          done

          while [ $RETRY -lt $MAX_RETRIES ]; do
            JOB=$(kubectl get job -n "$NS" -l "$LABEL" \
              --sort-by=.metadata.creationTimestamp -o name 2>/dev/null | tail -1)
            if [ -n "$JOB" ]; then
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: waiting for $JOB..."
              if kubectl wait "$JOB" -n "$NS" --for=condition=complete --timeout=60s 2>/dev/null; then
                echo "Seed-cases completed."
                break
              fi
            else
              echo "Attempt $((RETRY+1))/$MAX_RETRIES: no job found yet..."
            fi
            RETRY=$((RETRY + 1))
            [ $RETRY -lt $MAX_RETRIES ] && sleep 5
          done

          if [ $RETRY -eq $MAX_RETRIES ]; then
            echo "ERROR: seed-cases job did not complete after $MAX_RETRIES attempts."
            exit 1
          fi

      # ── Phase 5: UI (dashboard) ──
      - name: Apply UI
        run: kubectl apply -f "$APP_DIR/safezone-ui.yaml"

      - name: Wait for UI healthy
        run: |
          set -euo pipefail
          echo "Waiting for dashboard..."
          until kubectl get deploy safezone-dashboard -n "$NS" &>/dev/null && \
                kubectl rollout status deploy/safezone-dashboard -n "$NS" --timeout=120s; do
            sleep 5
          done
          echo "UI is ready."

      - name: Deployment complete
        run: echo "${{ inputs.environment }} app layer deployed successfully!"
