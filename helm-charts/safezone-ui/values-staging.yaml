global:
  environment: staging
  ghcr:
    imagePullSecrets: ghcr-pull-secret

dashboard:
  # FROZEN classic exhibit — no per-env image override; inherits the pinned tag
  # from values.yaml (0.3.6). See values.yaml for the freeze rationale.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: chorde.io/avail
                operator: In
                values:
                  - always

dashboard-v2:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: chorde.io/avail
                operator: In
                values:
                  - always
