# ---------------------------------
# Global settings for all charts in the safezone-ui umbrella chart
# These settings can be overridden in individual subcharts if needed
# ---------------------------------
global:
  safezone:
    # Optional: Override the full name of the SafeZone deployment
    fullnameOverride: ""

  environment: "" # REQUIRED: Environment name (e.g., dev,staging, production)
  
  ghcr:
    imagePullSecrets: "" # REQUIRED: Name of the Kubernetes Secret for pulling images from ghcr.io 
  
  # Service discovery settings for inter-service communication
  # You can customize the service names and ports based on your deployment
  # These settings are used in the subcharts to configure service endpoints 
  # And the access URLs for each service in the ConfigMap: safezone-config
  serviceDiscovery:
    timeServer:
      name: time-server
      port: 8000
    analyticsAPI:
      name: analytics-api
      port: 8000
    dashboard:
      name: dashboard
      port: 8080
    dashboardV2:
      name: dashboard-v2
      port: 80

# ---------------------------------
# dashboard (classic) is the legacy Plotly Dash interface, kept ONLY as an
# on-demand new-vs-old comparison exhibit. It self-prefixes to /dashboard-classic/.
# FROZEN: it is being dropped from the app build, so there are no further releases.
# Its tag is pinned to its last official release (0.3.6) and must NOT be bumped with
# the release version — dashboard-v2 is the sole forward-moving UI.
# dashboard references: https://github.com/rebodutch/SafeZone/blob/staging/tools/dashboard/README.md
# ---------------------------------
dashboard:
  image:
    repository: ghcr.io/rebodutch/safezone-dashboard # DO NOT CHANGE unless you fully understand its implications
    tag: 0.3.6 # FROZEN — do not bump (legacy comparison exhibit)

  logLevel: INFO # Optional: Loglevel (e.g., DEBUG, INFO, WARN, ERROR)
  affinity: {}  # Optional: Node affinity rules for Dashboard pods

# ---------------------------------
# dashboard-v2 is the default web interface: a React SPA served as static files
# by nginx (no app runtime). It is exposed at /dashboard; its /dashboard/api and
# /dashboard/time calls are routed by the gateway HTTPRoute, not this container.
# ---------------------------------
dashboard-v2:
  image:
    repository: ghcr.io/rebodutch/safezone-dashboard-v2 # DO NOT CHANGE unless you fully understand its implications
    tag: 0.3.7

  affinity: {}  # Optional: Node affinity rules for Dashboard v2 pods