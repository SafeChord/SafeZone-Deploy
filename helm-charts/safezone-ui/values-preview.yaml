global:
  environment: staging # preview environment setting should be "staging" (only three options: dev、staging or production)
  ghcr:
    imagePullSecrets: ghcr-pull-secret 

dashboard:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: chorde.io/avail
                operator: In
                values:
                  - always