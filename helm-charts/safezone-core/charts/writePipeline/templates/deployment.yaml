---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "safezone.worker.basename" . }}
  labels:
  {{- include "safezone.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        {{- include "safezone.selectorLabels" . | nindent 8 }}
        app: worker
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.ghcr.imagePullSecret }}
      containers:
        - name: worker
          image: {{ .Values.worker.image }}:{{ .Values.worker.tag }}
          imagePullPolicy: IfNotPresent
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            - name: KAFKA_BROKER
              value: {{ .Values.global.kafka.brokers | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.global.kafka.topic | quote }}
            - name: KAFKA_GROUP_ID
              value: {{ .Values.global.kafka.consumerGroup | quote }}
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.database.existingSecret | quote }}
                  key: db_url
            - name: BATCH_SIZE
              value: {{ .Values.worker.batch.size | quote }}
            - name: FLUSH_INTERVAL
              value: {{ .Values.worker.batch.flushInterval | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.worker.logLevel | quote }}
      affinity:
        {{- toYaml .Values.worker.affinity | nindent 8 }}