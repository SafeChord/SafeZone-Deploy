---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "safezone.pandemicSimulator.basename" . }}
  labels:
  {{- include "safezone.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pandemic-simulator
  template:
    metadata:
      labels:
        {{- include "safezone.selectorLabels" . | nindent 8 }}
        app: pandemic-simulator
    spec:
      imagePullSecrets:
        - name: {{ .Values.global.ghcr.imagePullSecret }}
      containers:
        - name: pandemic-simulator
          image: {{ .Values.simulator.image }}:{{ .Values.simulator.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            - name: INGESTOR_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fullname" . }}-config
                  key: INGESTOR_URL
            - name: MAX_CONCURRENT_REQUESTS
              value: {{ .Values.simulator.async.concurrentRequests | quote }}
            - name: SERVICE_VERSION
              value: {{ .Values.simulator.tag | quote }}   
            - name: SERVICE_PORT
              value: "8000"
            - name: LOG_LEVEL
              value: {{ .Values.simulator.logLevel | quote }}
          volumeMounts:
            - name: data-volume
              mountPath: {{ .Values.simulator.volume.data.filePath }}/{{ .Values.simulator.volume.data.fileName }}
              readOnly: true
              subPath: {{ .Values.simulator.volume.data.fileName }}
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ .Values.simulator.volume.persistentVolumeClaim.claimName }}
      affinity:
        {{- toYaml .Values.simulator.affinity | nindent 8 }}

---
