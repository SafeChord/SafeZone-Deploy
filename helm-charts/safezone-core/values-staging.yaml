# umbrella values for the safezone project
global:
  environment: "staging"
  ghcr:
    imagePullSecret: ghcr-pull-secret
  database:
    existingSecret: k3han-db-secrets
  redis:
    host: valkey.redis.svc.cluster.local
    existingSecret: k3han-redis-secrets
  cache:
    host: valkey-cache.safezone.svc.cluster.local
    port: 6379
    existingSecret: safezone-cache-secrets
  kafka:
    brokers: k3han-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
    topic: "covid.case.data"
    consumerGroup: "safezone-worker-group"


# readPipeline subchart contains the analytics API and dashboard
readPipeline:
  analyticsAPI:
    affinity: 
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: chorde.io/avail
                operator: In
                values: 
                 - always

# writePipeline subchart contains the simulator、ingestor and worker
writePipeline:
  simulator:
    volume:
      persistentVolumeClaim:
        type: "full-data"
        volumeName: "acer-nfs-1g-3"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: chorde.io/avail
                operator: In
                values: 
                 - always
  ingestor:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: chorde.io/avail
                operator: In
                values: 
                 - always
  worker:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: chorde.io/avail
                operator: In
                values: 
                - always