# ---------------------------------
# Global settings for all charts in the safezone-infra umbrella chart
# These settings can be overridden in individual subcharts if needed
# ---------------------------------
global:
  safezone:
    # Optional: Override the full name of the SafeZone deployment
    fullnameOverride: ""

  environment: "" # REQUIRED: Environment name (e.g., dev,staging, production)
  
  ghcr:
    imagePullSecrets: "" # REQUIRED: Name of the Kubernetes Secret for pulling images from ghcr.io 
  
  redis:
    host: "" # REQUIRED: System Redis who stores system-level data such as time configuration and system info
    port: 6379 # Optional: System Redis port, default is 6379
    
    # You can customize these DB numbers based on your requirements
    # Make sure these DB numbers do not conflict with other applications using the same Redis instance
    statusDB: 0 # Optional: System Redis database number for system status, default is 0
    timeDB: 1 # Optional: System Redis database number for time server, default is 1

    # REQUIRED: Name of the Kubernetes Secret containing System Redis credentials
    # The secret must include the key `redis-password`
    # Redis reference: https://redis.io/docs/management/security/security-redis-password/
    existingSecret: "" # Optional: Global Redis secret for all charts
  
  database: 
    # REQUIRED: Name of the Kubernetes Secret containing database credentials
    # The secret must include the key `db_url` and `replica_url` (example: postgres://user:password@host:port/dbname)
    # Database reference: https://www.postgresql.org/docs/current/auth-methods.html
    existingSecret: "" 
  
  cache:
    # the following two options should be same as cache.auth  
    # @param auth.password Redis&reg; password
    # Defaults to a random 10-character alphanumeric string if not set
    password: ""

    # REQUIRED: Name of the Kubernetes Secret containing cache (Redis) credentials
    # The secret must include the key `redis-password`
    # Cache (Redis) reference: https://redis.io/docs/management/security/security-redis-password/
    existingSecret: "" 
  
  # Service discovery settings for inter-service communication
  # You can customize the service names and ports based on your deployment
  # These settings are used in the subcharts to configure service endpoints 
  # And the access URLs for each service in the ConfigMap: safezone-config
  serviceDiscovery:
    cliRelay:
      name: cli-relay
      port: 8000
    timeServer:
      name: time-server
      port: 8000
    simulator:
      name: pandemic-simulator
      port: 8000
    ingestor:
      name: ingestor
      port: 8000
    worker:
      name: worker
    analyticsAPI:
      name: analytics-api
      port: 8000
    dashboard:
      name: dashboard
      port: 8080
    mkdoc:
      name: mkdoc
      port: 8080

# ---------------------------------
# cli-relay is a service that acts as a relay for command-line interface (CLI) requests.
# It is designed to work with the SafeZone project and provides a way to interact with the system through CLI commands.
# cli-relay references: https://github.com/rebodutch/SafeZone/blob/staging/tools/cli/README.md
# ---------------------------------
cliRelay:
  image: 
    repository: ghcr.io/rebodutch/safezone-cli-relay # DO NOT CHANGE unless you fully understand its implications
    tag: 0.2.1
  auth:
    # REQUIRED: Path to the role file within the container
    # This file defines the roles and permissions for CLI Relay operations
    # Example: /app/roles.example.yml
    roleFile: ""  # Path to the role file (e.g., /app/roles.example.yml)
    # REQUIRED: Name of the Kubernetes Secret containing Google OAuth credentials
    # The secret must include the key `CLIENT_ID`
    # Google OAuth reference: https://developers.google.com/identity/protocols/oauth2/web-server#creatingcred
    authSecret: ""

  database:
    existingSecret: "" # Optional: Override global.database.existingSecret for CLI Relay

  redis:
    host: "" # Optional: Override global.redis.host for CLI Relay
    port: "" # Optional: Override global.redis.port for CLI Relay
    db: "" # Optional: Override global.redis.statusDB for CLI Relay
    existingSecret: "" # Optional: Override global.redis.existingSecret for CLI Relay

  cache:
    host: "" # Optional: Override global.cache.host for CLI Relay
    port: "" # Optional: Override global.cache.port for CLI Relay
    db: "" # Optional: Override global.cache.db for CLI Relay
    # the following two options should be same as cache.auth
    password: "" # Optional: Directly set Redis password for CLI Relay (overrides existingSecret)
    existingSecret: "" # Optional: Override global.cache.existingSecret for CLI Relay

  logLevel: INFO # Optional: Loglevel (e.g., DEBUG, INFO, WARN, ERROR)
  affinity: {}  # Optional: Node affinity rules for CLI Relay pods

# -------------------------------
# time-server is a service that provides accurate time synchronization for devices within the SafeZone network.
# It is an fastapi server that provides a only way to get system time(maybe mock time) through HTTP API.
# time-server references: https://github.com/rebodutch/SafeZone/tree/main/tools/time-server/README.md
# ---------------------------------
timeServer:
  image:
    repository: ghcr.io/rebodutch/safezone-time-server # DO NOT CHANGE unless you fully understand its implications
    tag: 0.2.1

  redis:
    host: "" # Optional: Override global.redis.host for Time Server
    port: "" # Optional: Override global.redis.port for Time Server
    db: "" # Optional: Override global.redis.timeDB for Time Server
    
    # the following two options should be same as cache.auth
    password: "" # Optional: Directly set Redis password for Time Server (overrides existingSecret)
    existingSecret: "" # Optional: Override global.redis.existingSecret for Time Server

  logLevel: INFO # Optional: Loglevel (e.g., DEBUG, INFO, WARN, ERROR)
  affinity: {}  # Optional: Node affinity rules for time server pods

# -------------------------------
# Redis instance for caching service-layer data (used by APIs, dashboard, etc.)
# Stores high-frequency data such as query results and session cache
# -------------------------------
# the values here are customized for SafeZone project
# full values can be found in the /charts/redis-cache/values.yaml
cache:
   # Override the full name of the Redis cache instance
  fullnameOverride: "safezone-redis-cache" 

  # Customized for this project: standalone Redis without replica
  architecture: standalone
  replica:
    enabled: false

  # it should be the same as global.cache.existingSecret
  auth:
    ## @param auth.password Redis&reg; password
    ## Defaults to a random 10-character alphanumeric string if not set
    password: ""

    # REQUIRED: Name of the existing Kubernetes Secret containing the Redis password
    # The secret must include the key `redis-password`
    # Reference: https://redis.io/docs/management/security/security-redis-password/
    existingSecret: ""

    # If password and existingSecret are not set, the Bitnami Redis chart will generate a random password automatically
  master:
    # @param master.persistence.enabled Enable Redis&reg; master persistence using PVC
    persistence:
      enabled: false # only for cache use cases， set to false to avoid unnecessary disk usage
    affinity: {}  # Optional: Node affinity rules for Redis-cache master pods

# ---------------------------------
# SafeZone is exposed through an Ingress resource, which is a Kubernetes object that manages external access to services within the cluster.
# The Ingress resource allows you to define rules for routing external traffic to the appropriate services based on the request's host and path.
# ----------------------------------
ingress:
  className: ""  # Ingress class name (e.g., traefik, nginx)
  host: ""  # Host for SafeZone ingress (e.g., safezone.example.com)
  dashboard:
    path: /dashboard  # Path for the dashboard ingress
  cliRelay:
    path: /cli  # Path for the CLI Relay ingress