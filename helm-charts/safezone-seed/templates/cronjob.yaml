{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-daily
  labels:
    {{- include "safezone.selectorLabels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          imagePullSecrets:
            - name: {{ .Values.image.pullSecret }}
          restartPolicy: Never
          containers:
            - name: daily-simulate
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: Always
              command:
                - bash
                - "scripts/{{ .Values.cronjob.script }}"
              env:
                - name: ENVIRONMENT
                  value: {{ .Values.env.environment | quote }}
                - name: RELAY_TIMEOUT
                  value: {{ .Values.env.relayTimeout | quote }}
                - name: TOKEN_FILE
                  value: {{ .Values.env.tokenFile | quote }}
                - name: RELAY_URL
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "fullname" . }}-config
                      key: CLI_RELAY_URL
                - name: CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.auth.authSecret }}
                      key: client_id
                - name: CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.auth.authSecret }}
                      key: client_secret
                - name: REFRESH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.auth.authSecret }}
                      key: refresh_token
{{- end }}
