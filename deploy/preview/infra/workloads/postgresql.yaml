apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: db-primary
  namespace: safezone-preview
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 1 
  imageName: ghcr.io/cloudnative-pg/postgresql:17.7

  # Storage strategy for Preview: Simple local-path with persistent claim but no specific node affinity
  storage:
    size: 5Gi
    storageClass: local-path

  enableSuperuserAccess: true

  superuserSecret:
      name: k3han-db-secrets

  postgresql:
    parameters:
      max_slot_wal_keep_size: "1GB"
    pg_hba:
      - host all all all scram-sha-256
