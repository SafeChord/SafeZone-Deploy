apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-cache
  namespace: safezone-preview
  labels:
    app: valkey-cache
spec:
  serviceName: valkey-cache
  replicas: 1
  selector:
    matchLabels:
      app: valkey-cache
  template:
    metadata:
      labels:
        app: valkey-cache
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8.1
          command: ["sh", "-c", "valkey-server --requirepass $VALKEY_PASSWORD --appendonly no"]
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: safezone-cache-secrets
                  key: redis-password
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-cache
  namespace: safezone-preview
spec:
  ports:
    - port: 6379
  selector:
    app: valkey-cache
