apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: preview-default-policy
  namespace: safezone-preview
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  podSelector: {} # 選取所有 Pod
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {} # Allow intra-namespace traffic
    - namespaceSelector: # CNPG operator health checks (port 8000)
        matchLabels:
          kubernetes.io/metadata.name: database
    - namespaceSelector: # Ingress controller → app services
        matchLabels:
          kubernetes.io/metadata.name: ingress
  egress:
  - {} # Allow all egress: Kafka (kafka ns), DNS (kube-system), external APIs
