apiVersion: v1
kind: ServiceAccount
metadata:
  name: safezone-preview-ci-sa
  namespace: safezone-preview
---
# Permission 1: Application CRUD in argocd namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: preview-app-crd-role
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: preview-bind-app-crd
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: safezone-preview-ci-sa
    namespace: safezone-preview
roleRef:
  kind: Role
  name: preview-app-crd-role
  apiGroup: rbac.authorization.k8s.io
---
# Permission 2: SealedSecret management in safezone-preview namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: preview-sealedsecret-role
  namespace: safezone-preview
rules:
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: preview-bind-sealedsecret
  namespace: safezone-preview
subjects:
  - kind: ServiceAccount
    name: safezone-preview-ci-sa
    namespace: safezone-preview
roleRef:
  kind: Role
  name: preview-sealedsecret-role
  apiGroup: rbac.authorization.k8s.io
---
# Permission 3: Workload inspection in safezone-preview namespace
# Required for: rollout status, job wait
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: preview-workload-role
  namespace: safezone-preview
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: preview-bind-workload
  namespace: safezone-preview
subjects:
  - kind: ServiceAccount
    name: safezone-preview-ci-sa
    namespace: safezone-preview
roleRef:
  kind: Role
  name: preview-workload-role
  apiGroup: rbac.authorization.k8s.io
