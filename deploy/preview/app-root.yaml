apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  namespace: argocd
  name: safezone-preview-apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    safezone.io/stage: preview-app
spec:
  project: safezone
  source:
    repoURL: https://github.com/SafeChord/SafeZone-Deploy.git
    targetRevision: deploy/0.2.1
    path: deploy/preview/app
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
