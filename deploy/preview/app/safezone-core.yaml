apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  namespace: argocd
  name: safezone-preview-core
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: safezone
  source:
    repoURL: https://github.com/SafeChord/SafeZone-Deploy.git
    targetRevision: preview/0.3.7
    path: helm-charts/safezone-core
    helm:
      releaseName: safezone-core
      valueFiles:
        - values-preview.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: safezone-preview
  syncPolicy:
    automated:
      prune: true
      selfHeal: true