apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  namespace: argocd
  name: safezone-infra
spec:
  project: safezone
  source:
    repoURL: https://github.com/SafeChord/SafeZone-Deploy.git
    targetRevision: deploy/0.2.1
    path: helm-charts/safezone-infra
    helm:
      valueFiles:
        - values-preview.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: safezone-preview
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  # Ignore metadata changes to avoid unnecessary syncs
  ignoreDifferences:
  - group: apps
    kind: Deployment
    name: safezone-cli-relay
    jsonPointers:
    - /metadata/app