apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: staging-default-policy
  namespace: safezone
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  podSelector: {} # All pods in namespace
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {} # Allow intra-namespace traffic
    - namespaceSelector: # Ingress controller → app services
        matchLabels:
          kubernetes.io/metadata.name: ingress
  egress:
  - {} # Allow all egress: DB (database ns), Valkey (redis ns), Kafka (kafka ns), DNS
