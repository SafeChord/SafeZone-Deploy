apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  namespace: argocd
  name: safezone-staging-ops-schema
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: safezone
  source:
    repoURL: https://github.com/SafeChord/SafeZone-Deploy.git
    targetRevision: staging
    path: helm-charts/safezone-ops
    helm:
      releaseName: safezone-ops-schema
      valueFiles:
        - values-staging-schema.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: safezone
  syncPolicy:
    automated:
      prune: true
      selfHeal: true