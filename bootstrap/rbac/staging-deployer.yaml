apiVersion: v1
kind: ServiceAccount
metadata:
  name: safezone-ci-sa
  namespace: safezone
---
# Permission 1: Application CRUD in argocd namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: staging-app-crd-role
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: staging-bind-app-crd
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: safezone-ci-sa
    namespace: safezone
roleRef:
  kind: Role
  name: staging-app-crd-role
  apiGroup: rbac.authorization.k8s.io
---
# Permission 2: Workload inspection in safezone namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: staging-workload-role
  namespace: safezone
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: staging-bind-workload
  namespace: safezone
subjects:
  - kind: ServiceAccount
    name: safezone-ci-sa
    namespace: safezone
roleRef:
  kind: Role
  name: staging-workload-role
  apiGroup: rbac.authorization.k8s.io
